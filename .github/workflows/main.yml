name: Trends and AX Data Crawler

on:
  schedule:
    # 한국 시간(KST) 월~금 오전 8시 발송 
    # = UTC 기준 일~목(0-4) 23시 00분
    - cron: '0 12 * * 0-6'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade google-generativeai
        pip install -r requirements.txt

    - name: Run Crawler
      env:
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECEIVER_EMAIL: hansu814.ryu@samsung.com,jihoon33.kim@samsung.com,glassman@samsung.comm,chaneast.kim@samsung.com,bangz0@samsung.com,tjsong@samsung.com,hj71.song@samsung.com,yoonsj@samsung.com,heeseon.yoon@samsung.com,laguna@samsung.com,th.jeong@samsung.com,jackie.chung@samsung.com,ally.chae@samsung.com,yoonseok@samsung.com,eunji0313.choi@samsung.com
        
         
      run: python crawler.py

    - name: Commit and Push if changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data.json
        git diff-index --quiet HEAD || git commit -m "Update Crawled Data"
        git push
