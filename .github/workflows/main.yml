name: Trends and AX Data Crawler

on:
  schedule:
    # 한국 시간(KST) 월~금 오전 8시 발송 
    # = UTC 기준 일~목(0-4) 23시 00분
    - cron: '0 23 * * 0-6'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade google-generativeai
        pip install -r requirements.txt

    - name: Run Crawler
      env:
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECEIVER_EMAIL: "${{ secrets.RECEIVER_EMAIL }}"
        
        # 👇 추가된 부분: 메일 서론 작성 (| 기호를 써서 여러 줄 작성)
        EMAIL_INTRO: |
          안녕하세요. 
          GDC실행그룹(서비스일류화) 류한수프로입니다.
          
          최신 GDC동향 및 AX(AI Transformation) 트렌드를 공유드립니다.
          
          오늘 수집된 주요 데이터 및 리포트는 아래와 같습니다.
          --------------------------------------------------
          
      run: python crawler.py

    - name: Commit and Push if changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data.json
        git diff-index --quiet HEAD || git commit -m "Update Crawled Data"
        git push
