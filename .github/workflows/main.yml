name: Trends and AX Data Crawler

on:
  schedule:
    # 한국 시간(KST) 월~금 오후 9시 발송 (크론식은 UTC 기준 12:00)
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade google-generativeai
        pip install beautifulsoup4 lxml requests
        pip install -r requirements.txt

    - name: Run Crawler
      env:
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      run: python crawler.py

    - name: Commit and Push if changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # data.json 뿐만 아니라 AI 히스토리와 생성된 웹페이지까지 모두 추가
        git add data.json history.json index.html
        git diff-index --quiet HEAD || git commit -m "Update Crawled Data, History, and Webpage"
        git push
