<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDC & AX 인사이트 대시보드</title>
    <style>
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .title { font-size: 18px; font-weight: bold; color: #2c3e50; text-decoration: none; }
        .title:hover { text-decoration: underline; }
        .summary { color: #7f8c8d; font-size: 14px; margin-top: 10px; line-height: 1.5; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .badge-premium { background-color: #ffecd2; color: #d35400; }
        .feedback-section { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #eee; }
        
        /* 🔥 클릭 하이라이트 애니메이션 적용된 피드백 버튼 스타일 */
        .feedback-btn { border: 1px solid transparent; background: transparent; cursor: pointer; font-size: 18px; margin-right: 5px; padding: 5px 8px; border-radius: 8px; transition: all 0.2s ease; }
        .feedback-btn:hover { background-color: #f0f0f0; transform: scale(1.1); }
        .feedback-btn.selected { background-color: #e8f4fd; border: 1px solid #3498db; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1 style="text-align: center; color: #003366; border-bottom: 3px solid #3498db; padding-bottom: 15px; display: inline-block; margin-bottom: 40px;">GDC & AX 프리미엄 인사이트</h1>
    <div id="news-container"></div>
</div>

<script type="module">
    // 🚨 중요: 본인의 Firebase 프로젝트 Config 설정으로 반드시 변경하세요!
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdmPmb_VuZSmwrOX8LmmpBUihQnsV0e_U",
        authDomain: "gdc-monitoring.firebaseapp.com",
        projectId: "gdc-monitoring",
        storageBucket: "gdc-monitoring.firebasestorage.app",
        messagingSenderId: "60904767725",
        appId: "1:60904767725:web:082d1d2280de5b45010ce4"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentRating = {};

    window.openFeedback = function(itemId, rating) {
        currentRating[itemId] = rating;
        
        // 💡 모든 버튼에서 selected 하이라이트 클래스 제거 후, 현재 누른 버튼에만 명시적으로 추가
        ['good', 'normal', 'bad'].forEach(r => {
            const btn = document.getElementById(`btn-${r}-${itemId}`);
            if(btn) btn.classList.remove('selected');
        });
        const selectedBtn = document.getElementById(`btn-${rating}-${itemId}`);
        if(selectedBtn) selectedBtn.classList.add('selected');

        document.getElementById('feedback-form-' + itemId).style.display = 'block';
    };

    window.submitFeedback = async function(itemId, category, articleTitle) {
        const comment = document.getElementById('comment-' + itemId).value;
        const rating = currentRating[itemId];
        const btn = document.getElementById('btn-submit-' + itemId);
        btn.innerText = "전송 중...";

        try {
            await addDoc(collection(db, "feedbacks"), {
                article_id: itemId,
                title: articleTitle,
                category: category,
                rating: rating,
                comment: comment,
                timestamp: serverTimestamp()
            });
            document.getElementById('feedback-wrapper-' + itemId).innerHTML = "<span style='color:green; font-size:13px; font-weight:bold;'>✅ 소중한 피드백이 반영되었습니다. 감사합니다!</span>";
        } catch (e) {
            console.error("Error adding document: ", e);
            alert("피드백 전송에 실패했습니다.");
            btn.innerText = "의견 제출";
        }
    };

    // data.json 데이터 가져와서 동적 렌더링
    fetch('data.json')
        .then(response => {
            if (!response.ok) throw new Error("data.json 로드 실패");
            return response.json();
        })
        .then(data => {
            const container = document.getElementById('news-container');
            
            Object.keys(data).forEach(category => {
                const categoryData = data[category].data || [];
                
                categoryData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const safeTitle = item.title ? item.title.replace(/'/g, "\\'") : '제목 없음';
                    
                    let contentHtml = '';

                    // 💡 보라색 톤앤매너가 반영된 텔레그램 가이드 전용 레이아웃 렌더링
                    if (category === 'telegram') {
                        const formattedMethod = (item.method || '').replace(/\n/g, '<br>');
                        contentHtml = `
                            <div style="font-size: 13px; font-weight: bold; margin-bottom: 10px; color: #6a1b9a;">
                                <span style="background-color: #f3e5f5; padding: 4px 8px; border-radius: 4px;">출처: ${item.channel_name || 'Telegram'}</span>
                                <span style="color: #e74c3c; margin-left: 5px;">[${item.score}점]</span>
                            </div>
                            <a href="${item.link}" target="_blank" class="title" style="color: #2c3e50;">${item.title}</a>
                            
                            <div style="background-color: #faf5ff; padding: 15px; border-radius: 6px; margin-top: 15px; border: 1px solid #f3e5f5;">
                                <p style="margin: 0 0 10px 0; font-size: 14px; color: #34495e;"><strong>🎯 적용 상황:</strong> ${item.situation || ''}</p>
                                <p style="margin: 0 0 10px 0; font-size: 14px; color: #34495e;"><strong>🛠️ 구체적 활용법:</strong><br><span style="display:inline-block; margin-top:5px; padding:10px; background:#fff; border:1px solid #e1e8ed; border-radius:4px; width:100%; box-sizing:border-box; font-family:monospace; line-height:1.6;">${formattedMethod}</span></p>
                                <p style="margin: 0; font-size: 14px; color: #34495e;"><strong>✨ 기대 효과:</strong> ${item.effect || ''}</p>
                            </div>
                        `;
                    } 
                    // 일반 기사 및 채용 정보 레이아웃 렌더링
                    else {
                        let badges = '';
                        if (item.score >= 85) badges += `<span class="badge badge-premium">🔥 AI 추천 (Score: ${item.score})</span>`;
                        
                        contentHtml = `
                            ${badges}
                            <br>
                            <a href="${item.link}" target="_blank" class="title">${item.title}</a>
                            <p class="summary"><strong>[요약]</strong> ${item.summary || '요약 정보가 없습니다.'}</p>
                        `;
                    }

                    // 통합 피드백 UI 조립 및 ID 매핑
                    card.innerHTML = `
                        ${contentHtml}
                        <div id="feedback-wrapper-${item.id}" class="feedback-section">
                            <span style="font-size: 13px; color: #666; margin-right: 5px;">이 인사이트가 유용했나요?</span>
                            <button id="btn-good-${item.id}" class="feedback-btn" onclick="openFeedback('${item.id}', 'good')">👍</button>
                            <button id="btn-normal-${item.id}" class="feedback-btn" onclick="openFeedback('${item.id}', 'normal')">😐</button>
                            <button id="btn-bad-${item.id}" class="feedback-btn" onclick="openFeedback('${item.id}', 'bad')">👎</button>
                            
                            <div id="feedback-form-${item.id}" style="display: none; margin-top: 10px;">
                                <textarea id="comment-${item.id}" placeholder="내용 정확도 및 실무 활용도에 대한 의견을 주관식으로 남겨주세요." style="width: 100%; height: 50px; font-family: 'Pretendard', sans-serif; border: 1px solid #ccc; border-radius: 4px; padding: 5px; resize: vertical;"></textarea>
                                <button id="btn-submit-${item.id}" onclick="submitFeedback('${item.id}', '${category}', '${safeTitle}')" style="margin-top: 5px; background: #003366; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">의견 제출</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        })
        .catch(error => {
            document.getElementById('news-container').innerHTML = `<p style="color:red; text-align:center;">오류 발생: ${error.message}</p>`;
        });
</script>

</body>
</html>
