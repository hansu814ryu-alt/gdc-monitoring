<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDC & AX 트렌드 리포트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f9f9f9; }
        .container { background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 15px; display: inline-block; }
        .section { margin-bottom: 40px; }
        .section h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 25px; font-size: 20px; }
        .insight-box { background-color: #e8f4fd; border-left: 4px solid #3498db; padding: 12px 15px; margin-bottom: 15px; border-radius: 0 4px 4px 0; color: #1a5f8e; }
        ul { list-style-type: none; padding: 0; margin: 0; }
        li { padding: 12px 0; border-bottom: 1px dashed #eee; transition: background-color 0.2s; }
        li:hover { background-color: #fcfcfc; }
        a.item-link { color: #2c3e50; text-decoration: none; font-size: 15px; display: block; }
        a.item-link:hover { color: #3498db; }
        .score { color: #e74c3c; font-weight: bold; margin-right: 5px; }
        .desc { font-size: 13px; color: #666; margin-top: 5px; padding-left: 45px; }
        .empty-msg { color: #888; font-style: italic; padding: 10px 0; }
        .more-link { display: inline-block; margin-top: 15px; color: #3498db; font-weight: bold; text-decoration: none; font-size: 14px; }
        .more-link:hover { text-decoration: underline; }
        .footer { text-align: center; margin-top: 50px; padding-top: 20px; border-top: 1px solid #ddd; color: #7f8c8d; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 일일 트렌드 및 기술 동향 리포트</h1>
        <p>Premium Insights (Score 85점 이상 선별)</p>
    </div>

    <div id="content">
        <p style="text-align: center; color: #888;">데이터를 불러오는 중입니다...</p>
    </div>

    <div class="footer">
        <p>※ 본 리포트는 AI 분석을 통해 85점 이상의 유효한 고품질 데이터만 선별하여 제공됩니다.</p>
        <p>생성일: <span id="date-placeholder"></span></p>
    </div>
</div>

<script>
    document.getElementById('date-placeholder').textContent = new Date().toLocaleDateString('ko-KR');

    // 이메일(build_email_section)과 완벽히 동일한 구조로 렌더링하는 함수
    function buildHtmlSection(title, dataObj, moreType, isJob = false, isOverseas = false) {
        if (!dataObj) return '';
        
        const insight = dataObj.insight || '';
        // 85점 초과만 필터링 & 내림차순 정렬
        let items = (dataObj.data || []).filter(item => (item.score || 0) > 85);
        items = items.sort((a, b) => (b.score || 0) - (a.score || 0));
        
        // 상위 5개만 슬라이싱
        const displayItems = items.slice(0, 5);

        let html = `<div class="section"><h2>${title}</h2>`;
        
        if (insight) {
            html += `<div class="insight-box">💡 <b>[AI 시사점]</b> ${insight}</div>`;
        }

        if (displayItems.length === 0) {
            html += `<div class="empty-msg">📌 85점 이상의 기준에 부합하는 프리미엄 데이터가 없습니다. (전체보기에서 확인 가능)</div>`;
        } else {
            html += `<ul>`;
            displayItems.forEach(item => {
                const scoreBadge = `<span class="score">[${item.score || 0}점]</span>`;
                
                if (isJob) {
                    html += `<li><a href="${item.link}" target="_blank" class="item-link">${scoreBadge} <b>[${item.company || '기업명 미상'}]</b> ${item.title}</a></li>`;
                } else if (isOverseas) {
                    html += `<li>
                                <a href="${item.link}" target="_blank" class="item-link">${scoreBadge} 🌍 ${item.translated_title || item.title}</a>
                                ${item.translated_desc ? `<div class="desc">${item.translated_desc}</div>` : ''}
                             </li>`;
                } else {
                    html += `<li><a href="${item.link}" target="_blank" class="item-link">${scoreBadge} ${item.title}</a></li>`;
                }
            });
            html += `</ul>`;
        }
        
        if (moreType) {
            html += `<a href="more.html?type=${moreType}" class="more-link">🔗 [웹페이지에서 전체 보기]</a>`;
        }
        html += `</div>`;
        
        return html;
    }

    // JSON 데이터 패치 및 렌더링
    fetch('data.json')
        .then(response => response.text())
        .then(text => {
            // 파이썬/JS 불리언 충돌 방지 정제 로직
            let cleanedText = text.replace(/:\s*False/g, ': false')
                                  .replace(/:\s*True/g, ': true')
                                  .replace(/:\s*None/g, ': null');
            
            const data = JSON.parse(cleanedText);
            const contentDiv = document.getElementById('content');
            
            let html = '';
            html += buildHtmlSection("📊 GDC 오프쇼어링 (MSP/ITO 위탁) 동향", data.gdc, "gdc");
            html += buildHtmlSection("🌍 해외 AI 원천기술 및 아키텍처", data.overseas, "overseas", false, true);
            html += buildHtmlSection("🏢 국내 기업 Enterprise AX (운영모델 전환)", data.ax_news, "ax");
            html += buildHtmlSection("💼 베트남 온사이트 인력 채용", data.vn_jobs, "vn", true);
            html += buildHtmlSection("💼 AX 전담 인력 채용", data.ax_jobs, "axjob", true);
            
            contentDiv.innerHTML = html;
        })
        .catch(error => {
            console.error("데이터 로드 실패:", error);
            document.getElementById('content').innerHTML = `<div class="empty-msg" style="color:red;">❌ 데이터를 불러오지 못했습니다. 크롤러를 다시 실행해주세요.</div>`;
        });
</script>

</body>
</html>
