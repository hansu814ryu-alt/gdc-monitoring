<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDC & AX 인사이트 대시보드</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .title { font-size: 18px; font-weight: bold; color: #2c3e50; text-decoration: none; }
        .title:hover { text-decoration: underline; }
        .summary { color: #7f8c8d; font-size: 14px; margin-top: 10px; line-height: 1.5; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .badge-premium { background-color: #ffecd2; color: #d35400; }
        .badge-threads { background-color: #000000; color: #ffffff; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1 style="text-align: center; color: #2c3e50;">GDC & AX 프리미엄 인사이트</h1>
    <div id="news-container"></div>
</div>

<script>
    // data.json 로드 및 에러 처리 적용
    fetch('data.json')
        .then(response => {
            if (!response.ok) throw new Error("데이터를 불러오는 데 실패했습니다.");
            return response.json();
        })
        .then(data => {
            const container = document.getElementById('news-container');
            
            // 카테고리별 데이터 렌더링
            Object.keys(data).forEach(category => {
                const categoryData = data[category].data || [];
                
                categoryData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // 점수 85점 이상은 프리미엄 배지, 90점 이상은 쓰레드 배지 추가
                    let badges = '';
                    if (item.score >= 85) {
                        badges += `<span class="badge badge-premium">🔥 AI 추천 (Score: ${item.score})</span>`;
                    }
                    if (item.score >= 90) {
                        badges += `<span class="badge badge-threads">🧵 Threads 발행됨</span>`;
                    }

                    card.innerHTML = `
                        ${badges}
                        <br>
                        <a href="${item.link}" target="_blank" class="title">${item.title}</a>
                        <p class="summary"><strong>[요약]</strong> ${item.summary || '요약 정보가 없습니다.'}</p>
                    `;
                    container.appendChild(card);
                });
            });
        })
        .catch(error => {
            document.getElementById('news-container').innerHTML = `<p style="color:red; text-align:center;">오류: ${error.message}</p>`;
        });
</script>

</body>
</html>
