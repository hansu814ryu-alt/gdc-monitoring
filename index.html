<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일일 트렌드 및 경쟁사 동향 리포트</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 20px; background-color: #f4f7fa; color: #333; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(45%, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .section { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        h2 { font-size: 1.2rem; color: #34495e; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        .insight-box { background-color: #f0f7ff; padding: 12px; margin-bottom: 15px; border-left: 4px solid #0056b3; font-size: 0.95rem; line-height: 1.5; border-radius: 0 4px 4px 0;}
        ul { list-style: none; padding: 0; margin: 0; flex-grow: 1; } 
        li { padding: 12px 0; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        a { text-decoration: none; color: #2980b9; font-weight: bold; }
        a:hover { color: #e74c3c; text-decoration: underline; }
        .date { font-size: 0.8em; color: #95a5a6; margin-top: 5px; }
        .more-link { text-align: right; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>📊 일일 트렌드 및 경쟁사 동향 리포트</h1>
    
    <div class="grid-container">
        <!-- 1. GDC 동향 -->
        <div class="section">
            <h2>📊 GDC 시장 및 경쟁사 동향</h2>
            <div id="gdc-insight" class="insight-box" style="display:none;"></div>
            <ul id="gdc-list"></ul>
            <div class="more-link"><a href="./more.html?type=gdc" target="_blank">[+ 수집된 기사 전체보기]</a></div>
        </div>
        
        <!-- 2. AX 뉴스 -->
        <div class="section">
            <h2>📰 AI 기술 근황 & AX 전환 사례</h2>
            <div id="ax-insight" class="insight-box" style="display:none;"></div>
            <ul id="ax-list"></ul>
            <div class="more-link"><a href="./more.html?type=ax" target="_blank">[+ 수집된 기사 전체보기]</a></div>
        </div>

        <!-- 3. 베트남 채용 -->
        <div class="section">
            <h2>💼 베트남 채용 (IT/BSE/통번역)</h2>
            <ul id="vn-list"></ul>
            <div class="more-link"><a href="./more.html?type=vn" target="_blank">[+ 수집된 공고 전체보기]</a></div>
        </div>

        <!-- 4. AX 채용 -->
        <div class="section">
            <h2>💼 AX 전담 인력 채용</h2>
            <ul id="ax-job-list"></ul>
            <div class="more-link"><a href="./more.html?type=axjob" target="_blank">[+ 수집된 공고 전체보기]</a></div>
        </div>
    </div>

    <script>
        fetch('./data.json')
            .then(response => response.json())
            .then(data => {
                const renderSection = (elementPrefix, sectionData, isJob = false) => {
                    const ul = document.getElementById(`${elementPrefix}-list`);
                    ul.innerHTML = '';
                    if (!sectionData.data || sectionData.data.length === 0) {
                        ul.innerHTML = '<li>데이터가 없습니다.</li>';
                    } else {
                        sectionData.data.slice(0, 5).forEach(item => {
                            if (isJob) {
                                ul.innerHTML += `<li><a href="${item.link}" target="_blank">[${item.company}] ${item.title}</a></li>`;
                            } else {
                                ul.innerHTML += `<li><a href="${item.link}" target="_blank">${item.title}</a><div class="date">${item.pubDate}</div></li>`;
                            }
                        });
                    }

                    if (sectionData.insight) {
                        const insightBox = document.getElementById(`${elementPrefix}-insight`);
                        if(insightBox) {
                            insightBox.innerHTML = `<strong>💡 [AI 시사점]</strong><br>${sectionData.insight}`;
                            insightBox.style.display = 'block';
                        }
                    }
                };

                renderSection('gdc', data.gdc, false);
                renderSection('ax', data.ax_news, false);
                renderSection('vn', data.vn_jobs, true);
                renderSection('ax-job', data.ax_jobs, true);
            })
            .catch(err => console.error('데이터 로드 실패:', err));
    </script>
</body>
</html>
