<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDC & AX 전체 기사 리스트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 40px; background-color: #f4f7f6; line-height: 1.6; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; max-width: 800px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #003366; border-bottom: 2px solid #3498db; padding-bottom: 10px; font-size: 24px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 20px 0; border-bottom: 1px solid #eee; display: block; }
        .score { color: #e74c3c; font-weight: bold; margin-right: 15px; font-size: 14px; white-space: nowrap; }
        a { color: #1a1a1a; text-decoration: none; font-size: 16px; word-break: keep-all; }
        a:hover { color: #3498db; text-decoration: underline; }
        .feedback-box { margin-top: 15px; background: #f9f9f9; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="page-title">전체 기사 리스트</h1>
        <ul id="list-container">
            <li>데이터를 분석하여 불러오는 중입니다...</li>
        </ul>
    </div>

    <script type="module">
        // 🚨 본인의 Firebase 프로젝트 Config 설정으로 반드시 변경하세요!
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentRating = {};

        window.openFeedback = function(itemId, rating) {
            currentRating[itemId] = rating;
            const form = document.getElementById('feedback-form-' + itemId);
            if(form) form.style.display = 'block';
        };

        window.submitFeedback = async function(itemId, category, articleTitle) {
            const comment = document.getElementById('comment-' + itemId).value;
            const rating = currentRating[itemId];
            const btn = document.getElementById('btn-submit-' + itemId);
            btn.innerText = "전송 중...";

            try {
                await addDoc(collection(db, "feedbacks"), {
                    article_id: itemId,
                    title: articleTitle,
                    category: category,
                    rating: rating,
                    comment: comment,
                    timestamp: serverTimestamp()
                });
                document.getElementById('feedback-wrapper-' + itemId).innerHTML = "<span style='color:green; font-weight:bold;'>✅ 피드백 반영 완료! 감사합니다.</span>";
            } catch (e) {
                console.error("Error: ", e);
                alert("피드백 전송에 실패했습니다.");
                btn.innerText = "의견 제출";
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const autoFeedbackId = urlParams.get('feedback_id');
        const autoRating = urlParams.get('rating');
        
        // 카테고리별 타이틀 매핑 추가
        const titles = {
            'gdc': '📊 GDC 오프쇼어링 동향',
            'overseas': '🌍 해외 AI 원천기술 및 아키텍처',
            'ax': '🏢 국내 기업 Enterprise AX',
            'msp_jobs': '💼 채용: MSP Player',
            'gdc_jobs': '💼 채용: 베트남 GDC 업체',
            'vet_jobs': '💼 채용: 외국인 IT 인력',
            'telegram': '💬 직장인 텔레그램 AI 업무 팁' // 💡 텔레그램 추가
        };
        
        document.getElementById('page-title').textContent = titles[type] || '전체 리스트';

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                let items = [];
                if (type === 'gdc') items = data.gdc?.data || [];
                else if (type === 'overseas') items = data.overseas?.data || [];
                else if (type === 'ax') items = data.ax_news?.data || [];
                else if (type === 'msp_jobs') items = (data.vn_jobs?.data || []).filter(j => j.category_code === 'MSP_PLAYER');
                else if (type === 'gdc_jobs') items = (data.vn_jobs?.data || []).filter(j => j.category_code === 'VET_GDC_FIRM');
                else if (type === 'vet_jobs') items = (data.vn_jobs?.data || []).filter(j => j.category_code === 'DOMESTIC_VET_IT');
                else if (type === 'telegram') items = data.telegram?.data || []; // 💡 텔레그램 추가

                const container = document.getElementById('list-container');
                container.innerHTML = '';
                
                if (items.length === 0) {
                    container.innerHTML = '<li style="color:#888;">📌 해당 카테고리에 수집된 데이터가 없습니다.</li>';
                    return;
                }

                items.forEach(item => {
                    const li = document.createElement('li');
                    const title = item.translated_title || item.title;
                    const safeTitle = title ? title.replace(/'/g, "\\'") : '제목없음';
                    
                    let contentHtml = '';
                    
                    // 💡 텔레그램 전용 레이아웃 분기
                    if (type === 'telegram') {
                        const formattedMethod = (item.method || '').replace(/\n/g, '<br>');
                        contentHtml = `
                            <div style="margin-bottom: 10px;">
                                <span class="score">[${item.score || 0}점]</span> 
                                <span style="font-size: 12px; color: #6a1b9a; font-weight: bold; background-color: #f3e5f5; padding: 2px 6px; border-radius: 4px;">[${item.channel_name}]</span>
                                <a href="${item.link}" target="_blank" style="font-weight:bold; color: #2c3e50;">${title}</a>
                            </div>
                            <div style="background-color: #faf5ff; padding: 15px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #f3e5f5; font-size: 14px;">
                                <p style="margin: 0 0 8px 0; color: #34495e;"><strong>🎯 적용 상황:</strong> ${item.situation || ''}</p>
                                <p style="margin: 0 0 8px 0; color: #34495e;"><strong>🛠️ 활용법:</strong><br><span style="display:inline-block; margin-top:4px; padding:8px; background:#fff; border:1px solid #e1e8ed; width:100%; box-sizing:border-box;">${formattedMethod}</span></p>
                                <p style="margin: 0; color: #34495e;"><strong>✨ 기대 효과:</strong> ${item.effect || ''}</p>
                            </div>
                        `;
                    } else {
                        // 일반 기사/공고 레이아웃
                        const company = item.company ? `[${item.company}] ` : '';
                        contentHtml = `
                            <div style="display: flex; align-items: flex-start;">
                                <span class="score">[${item.score || 0}점]</span> 
                                <a href="${item.link}" target="_blank">${company}${title}</a>
                            </div>
                        `;
                    }

                    li.innerHTML = `
                        <div id="item-${item.id}">
                            ${contentHtml}
                            
                            <div id="feedback-wrapper-${item.id}" class="feedback-box">
                                <span style="font-size: 13px; color: #666;">평가하기:</span>
                                <button onclick="openFeedback('${item.id}', 'good')" style="border:none; background:none; cursor:pointer;">👍</button>
                                <button onclick="openFeedback('${item.id}', 'normal')" style="border:none; background:none; cursor:pointer;">😐</button>
                                <button onclick="openFeedback('${item.id}', 'bad')" style="border:none; background:none; cursor:pointer;">👎</button>
                                
                                <div id="feedback-form-${item.id}" style="display: none; margin-top: 10px;">
                                    <textarea id="comment-${item.id}" placeholder="추가 의견을 남겨주세요." style="width: 100%; height: 50px; border-radius: 4px; padding: 5px; border: 1px solid #ccc;"></textarea>
                                    <button id="btn-submit-${item.id}" onclick="submitFeedback('${item.id}', '${type}', '${safeTitle}')" style="margin-top: 5px; background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">의견 제출</button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(li);
                });

                // 이메일에서 유입 시 해당 섹션으로 스크롤 이동 및 창 자동 오픈
                if (autoFeedbackId && autoRating) {
                    setTimeout(() => {
                        const targetEl = document.getElementById('item-' + autoFeedbackId);
                        if (targetEl) {
                            targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            window.openFeedback(autoFeedbackId, autoRating);
                            targetEl.style.backgroundColor = "#e8f4fd";
                            setTimeout(() => targetEl.style.backgroundColor = "transparent", 2000);
                        }
                    }, 500);
                }
            })
            .catch(err => {
                document.getElementById('list-container').innerHTML = '<li style="color:red;">❌ 데이터를 불러오는 데 실패했습니다.</li>';
            });
    </script>
</body>
</html>
