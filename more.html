<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDC & AX 전체 기사 리스트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 40px; background-color: #f4f7f6; line-height: 1.6; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; max-width: 800px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #003366; border-bottom: 2px solid #3498db; padding-bottom: 10px; font-size: 24px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 15px 0; border-bottom: 1px solid #eee; display: flex; align-items: flex-start; }
        .score { color: #e74c3c; font-weight: bold; margin-right: 15px; font-size: 14px; white-space: nowrap; }
        a { color: #1a1a1a; text-decoration: none; font-size: 16px; word-break: keep-all; }
        a:hover { color: #3498db; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="page-title">전체 기사 리스트</h1>
        <ul id="list-container">
            <li>데이터를 분석하여 불러오는 중입니다...</li>
        </ul>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        
        const titles = {
            'gdc': '📊 GDC 오프쇼어링 (MSP/ITO 위탁) 동향',
            'overseas': '🌍 해외 AI 원천기술 및 아키텍처',
            'ax': '🏢 국내 기업 Enterprise AX',
            'msp_jobs': '💼 채용: MSP Player',
            'gdc_jobs': '💼 채용: 베트남 GDC 업체',
            'vet_jobs': '💼 채용: 외국인 IT 인력'
        };
        
        document.getElementById('page-title').textContent = titles[type] || '전체 기사 리스트';

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                let items = [];
                if (type === 'gdc') items = data.gdc?.data || [];
                else if (type === 'overseas') items = data.overseas?.data || [];
                else if (type === 'ax') items = data.ax_news?.data || [];
                else if (type === 'msp_jobs') items = (data.vn_jobs?.data || []).filter(j => j.category_code === 'MSP_PLAYER');
                else if (type === 'gdc_jobs') items = (data.vn_jobs?.data || []).filter(j => j.category_code === 'VET_GDC_FIRM');
                else if (type === 'vet_jobs') items = (data.vn_jobs?.data || []).filter(j => j.category_code === 'DOMESTIC_VET_IT');

                const container = document.getElementById('list-container');
                container.innerHTML = '';
                
                if (items.length === 0) {
                    container.innerHTML = '<li style="color:#888;">📌 해당 카테고리에 수집된 데이터가 없습니다.</li>';
                    return;
                }

                items.forEach(item => {
                    const li = document.createElement('li');
                    const title = item.translated_title || item.title;
                    const company = item.company ? `[${item.company}] ` : '';
                    li.innerHTML = `
                        <span class="score">[${item.score || 0}점]</span> 
                        <a href="${item.link}" target="_blank">${company}${title}</a>
                    `;
                    container.appendChild(li);
                });
            })
            .catch(err => {
                document.getElementById('list-container').innerHTML = '<li style="color:red;">❌ 데이터를 불러오는 데 실패했습니다.</li>';
            });
    </script>
</body>
</html>
